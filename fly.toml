app = "simplehook-server"
primary_region = "ord"

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "8400"
  BASE_URL = "https://simplehook-server.fly.dev"
  FRONTEND_URL = "https://simplehook.dev"
  RUST_LOG = "simplehook_server=info"

[http_service]
  internal_port = 8400
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = 10000
    timeout = 5000
    method = "GET"
    path = "/health"

[processes]
  app = "simplehook-server"

[[vm]]
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"
