A<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f4f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Mono', monospace;
  }
  canvas { display: block; }
  button {
    margin-top: 28px;
    padding: 6px 18px;
    background: transparent;
    border: 1px solid #c8c5bc;
    border-radius: 6px;
    color: #9a9790;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  button:hover { color: #181714; border-color: #181714; }
</style>
</head>
<body>

<canvas id="c" width="220" height="220"></canvas>
<button onclick="start()">replay</button>

<script>
const CLR = '#181714';
const LW  = 2.8;
const R   = 74;
const S   = 220;
const CX  = S/2, CY = S/2;

function cornerOffset(i) {
  const a = Math.PI/3*i - Math.PI/2;
  return [Math.cos(a)*R, Math.sin(a)*R];
}
const HEX_OFF = Array.from({length:6}, (_,i) => cornerOffset(i));
const INNER   = [0, 2, 4];

const K = (4/3) * Math.tan(Math.PI/12);
function cubicCPs(i) {
  const a0 = Math.PI/3*i     - Math.PI/2;
  const a1 = Math.PI/3*(i+1) - Math.PI/2;
  const p0 = [Math.cos(a0)*R, Math.sin(a0)*R];
  const p1 = [Math.cos(a1)*R, Math.sin(a1)*R];
  return {
    cp0: [p0[0] + (-Math.sin(a0))*K*R, p0[1] + (Math.cos(a0))*K*R],
    cp1: [p1[0] + ( Math.sin(a1))*K*R, p1[1] + (-Math.cos(a1))*K*R],
  };
}
const CP_OFF = Array.from({length:6}, (_,i) => cubicCPs(i));

function lerp(a,b,t) { return a+(b-a)*t; }
const eio = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

function drawScene(edgeM, innerT, spinX) {
  ctx.clearRect(0, 0, S, S);
  ctx.strokeStyle = CLR;
  ctx.lineWidth   = LW;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.globalAlpha = 1;

  // vertical axis spin: only X scaled, Y untouched
  const proj = ([ox,oy]) => [CX + ox*spinX, CY + oy];
  const pts  = HEX_OFF.map(proj);

  for (let i = 0; i < 6; i++) {
    const a = pts[i], b = pts[(i+1)%6];
    ctx.beginPath();
    ctx.moveTo(a[0], a[1]);
    if (edgeM < 0.001) {
      ctx.lineTo(b[0], b[1]);
    } else {
      const { cp0, cp1 } = CP_OFF[i];
      const a0 = Math.PI/3*i     - Math.PI/2;
      const a1 = Math.PI/3*(i+1) - Math.PI/2;
      ctx.bezierCurveTo(
        CX + lerp(Math.cos(a0)*R, cp0[0], edgeM)*spinX,
        CY + lerp(Math.sin(a0)*R, cp0[1], edgeM),
        CX + lerp(Math.cos(a1)*R, cp1[0], edgeM)*spinX,
        CY + lerp(Math.sin(a1)*R, cp1[1], edgeM),
        b[0], b[1]
      );
    }
    ctx.stroke();
  }

  if (innerT > 0.001) {
    for (let k = 0; k < 3; k++) {
      const tgt = pts[INNER[k]];
      const lt  = Math.max(0, Math.min(1, (innerT-k*0.05)/(1-k*0.05)));
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(CX+(tgt[0]-CX)*lt, CY+(tgt[1]-CY)*lt);
      ctx.stroke();
    }
  }
}

// Timeline:
// 0    - 600   hold hex
// 600  - 1200  hex to cube
// 1200 - 1900  hold cube
// 1900 - 3300  spin 180 on vertical axis
// 3300 - 3600  hold after spin
// 3600 - 4300  cube to circle + un-flip
// 4300 - 5000  hold circle
// 5000 - 5700  circle to hex
// 5700 - 6200  hold hex, loop

const TOTAL = 6200;
let t0 = null, raf;

function getState(ms) {
  if (ms < 600)  return { edgeM: 0, innerT: 0, angle: 0 };
  if (ms < 1200) return { edgeM: 0, innerT: eio((ms-600)/600), angle: 0 };
  if (ms < 1900) return { edgeM: 0, innerT: 1, angle: 0 };
  if (ms < 3300) return { edgeM: 0, innerT: 1, angle: eio((ms-1900)/1400)*Math.PI };
  if (ms < 3600) return { edgeM: 0, innerT: 1, angle: Math.PI };
  if (ms < 4300) {
    const p = eio((ms-3600)/700);
    return { edgeM: p, innerT: 1-p, angle: lerp(Math.PI, 0, p) };
  }
  if (ms < 5000) return { edgeM: 1, innerT: 0, angle: 0 };
  if (ms < 5700) return { edgeM: 1-eio((ms-5000)/700), innerT: 0, angle: 0 };
  return { edgeM: 0, innerT: 0, angle: 0 };
}

function frame(now) {
  if (!t0) t0 = now;
  const ms = Math.min(now-t0, TOTAL);
  const { edgeM, innerT, angle } = getState(ms);
  drawScene(edgeM, innerT, Math.cos(angle));
  if (ms < TOTAL) raf = requestAnimationFrame(frame);
  else setTimeout(start, 800);
}

function start() {
  cancelAnimationFrame(raf);
  t0 = null;
  drawScene(0, 0, 1);
  raf = requestAnimationFrame(frame);
}

start();
</script>

</body>
</html>
