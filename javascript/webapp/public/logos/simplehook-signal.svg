<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="none"/>
  <!-- Concentric broadcast arcs (opening to the left, signal incoming) -->
  <path d="M44 20 Q52 32 44 44" fill="none" stroke="#1a1625" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M38 24 Q44 32 38 40" fill="none" stroke="#1a1625" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M32 28 Q36 32 32 36" fill="none" stroke="#1a1625" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Arrow pointing into the signal center -->
  <line x1="14" y1="32" x2="26" y2="32" stroke="#1a1625" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="22,28 26,32 22,36" fill="none" stroke="#1a1625" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center dot (the catch point) -->
  <circle cx="29" cy="32" r="3" fill="#f5a623"/>
</svg>
