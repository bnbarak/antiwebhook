<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog — simplehook</title>
    <meta name="description" content="Articles about webhooks, local development, AI agents, and the engineering decisions behind simplehook. How webhook URLs work, why they shouldn't change, and how AI agents can consume them." />

    <!-- Canonical (overridden by react-helmet-async per page) -->
    <link rel="canonical" href="https://simplehook.dev/blog" />

    <!-- Open Graph -->
    <meta property="og:title" content="Blog — simplehook" />
    <meta property="og:description" content="Articles about webhooks, local development, and AI agents." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://simplehook.dev/blog" />
    <meta property="og:site_name" content="simplehook" />
    <meta property="og:image" content="https://simplehook.dev/logos/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="simplehook Blog" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Blog — simplehook" />
    <meta name="twitter:description" content="Articles about webhooks, local development, and AI agents." />
    <meta name="twitter:image" content="https://simplehook.dev/logos/og-image.png" />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1e1834" />

    <!-- Font preload -->
    <link rel="preload" href="/fonts/dm-sans-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'DM Sans Variable';
        font-style: normal;
        font-display: swap;
        font-weight: 100 1000;
        src: url('/fonts/dm-sans-latin-wght-normal.woff2') format('woff2');
        unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
      }
      @view-transition { navigation: auto; }
      html { background: #0a0a0a; }
      body { animation: fadeIn 0.2s ease-out; font-family: 'DM Sans Variable', system-ui, sans-serif; }
      @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    </style>

    <!-- Prefetch -->
    <link rel="prefetch" href="/index.html" />
    <link rel="prefetch" href="/docs.html" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logos/simplehook-mark-light.svg" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-986DT6RXTL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-986DT6RXTL');
    </script>

    <!-- JSON-LD: Blog -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "simplehook Blog",
      "url": "https://simplehook.dev/blog",
      "description": "Articles about webhooks, local development, and AI agents.",
      "publisher": {
        "@type": "Organization",
        "name": "simplehook",
        "url": "https://simplehook.dev"
      }
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static SEO fallback content — replaced by React on mount -->
      <main style="max-width:700px;margin:0 auto;padding:80px 24px">
        <h1 style="font-size:38px;font-weight:400;line-height:1.15;margin:0 0 16px;color:#e5e5e5">simplehook Blog</h1>
        <p style="font-size:17px;line-height:1.6;color:#a1a1a1;margin-bottom:48px">
          How we think about webhooks, developer tools, and building for humans and AI agents.
        </p>

        <!-- Blog post cards injected at build time from src/lib/blog-posts.ts (see blogPostInjector in vite.config.ts) -->
        <!--BLOG_POSTS-->
      </main>
    </div>
    <script type="module" src="/src/entries/blog.tsx"></script>
  </body>
</html>
