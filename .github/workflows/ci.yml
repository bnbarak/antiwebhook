name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (build + 40 unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo build --release
        working-directory: server
      - run: cargo test
        working-directory: server

  sdk-express:
    name: Express SDK (19 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: javascript/sdk/express
      - run: npx tsc --noEmit
        working-directory: javascript/sdk/express
      - run: npx vitest run
        working-directory: javascript/sdk/express

  sdk-fastify:
    name: Fastify SDK (20 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: javascript/sdk/fastify
      - run: npx tsc --noEmit
        working-directory: javascript/sdk/fastify
      - run: npx vitest run
        working-directory: javascript/sdk/fastify

  sdk-flask:
    name: Flask SDK (28 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install simplehook-core flask websockets pytest pytest-asyncio
      - run: pip install -e .
        working-directory: python/flask
      - run: pytest -v
        working-directory: python/flask

  sdk-django:
    name: Django SDK (19 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install simplehook-core django websockets pytest pytest-asyncio
      - run: pip install -e .
        working-directory: python/django
      - run: pytest -v
        working-directory: python/django

  webapp:
    name: Webapp (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: javascript/webapp
      - run: npx tsc --noEmit
        working-directory: javascript/webapp
      - run: npx vite build
        working-directory: javascript/webapp

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [rust]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: simplehook
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://admin:secret@localhost:5434/simplehook
      RUST_LOG: simplehook_server=warn
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build server
        run: cargo build
        working-directory: server
      - name: Install test deps
        run: npm install
        working-directory: tests
      - name: Install Express SDK
        run: npm install
        working-directory: javascript/sdk/express
      - name: Install Express test app
        run: npm install
        working-directory: testApps/express
      - name: Auth tests (15)
        run: node --test auth.test.js
        working-directory: tests
      - name: Billing tests (17)
        run: node --test billing.test.js
        working-directory: tests
      - name: Stats tests (14)
        run: node --test stats.test.js
        working-directory: tests
      - name: Migration tests (9)
        run: node --test migrations.test.js
        working-directory: tests
      - name: E2E webhook tests (19)
        run: node --test e2e.test.js
        working-directory: tests
      - name: Stress tests (8)
        run: node --test stress.test.js
        working-directory: tests
      - name: E2E SDK tests (5)
        run: node --test e2e-sdk.test.js
        working-directory: testApps
