name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo build --release
        working-directory: server
      - run: cargo test
        working-directory: server

  sdk-express:
    name: Express SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build core from source
        run: npm install && npx tsc
        working-directory: javascript/sdk/core
      - run: npm install
        working-directory: javascript/sdk/express
      - run: rm -rf node_modules/simplehook-core && cp -R ../core node_modules/simplehook-core
        working-directory: javascript/sdk/express
      - run: npx tsc --noEmit
        working-directory: javascript/sdk/express
      - run: npx vitest run
        working-directory: javascript/sdk/express

  sdk-fastify:
    name: Fastify SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build core from source
        run: npm install && npx tsc
        working-directory: javascript/sdk/core
      - run: npm install
        working-directory: javascript/sdk/fastify
      - run: rm -rf node_modules/simplehook-core && cp -R ../core node_modules/simplehook-core
        working-directory: javascript/sdk/fastify
      - run: npx tsc --noEmit
        working-directory: javascript/sdk/fastify
      - run: npx vitest run
        working-directory: javascript/sdk/fastify

  sdk-hono:
    name: Hono SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build core from source
        run: npm install && npx tsc
        working-directory: javascript/sdk/core
      - run: npm install
        working-directory: javascript/sdk/hono
      - run: rm -rf node_modules/simplehook-core && cp -R ../core node_modules/simplehook-core
        working-directory: javascript/sdk/hono
      - run: npx tsc --noEmit
        working-directory: javascript/sdk/hono
      - run: npx vitest run
        working-directory: javascript/sdk/hono

  sdk-flask:
    name: Flask SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ../core
        working-directory: python/flask
      - run: pip install -e ".[dev]"
        working-directory: python/flask
      - run: pytest -v
        working-directory: python/flask

  sdk-django:
    name: Django SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ../core
        working-directory: python/django
      - run: pip install -e ".[dev]"
        working-directory: python/django
      - run: pytest -v
        working-directory: python/django

  sdk-fastapi:
    name: FastAPI SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ../core
        working-directory: python/fastapi
      - run: pip install -e ".[dev]"
        working-directory: python/fastapi
      - run: pytest -v
        working-directory: python/fastapi

  webapp:
    name: Webapp (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: javascript/webapp
      - run: npx tsc --noEmit
        working-directory: javascript/webapp
      - run: npx vite build
        working-directory: javascript/webapp

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [rust]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: simplehook
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://admin:secret@localhost:5434/simplehook
      RUST_LOG: simplehook_server=warn
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build server
        run: cargo build
        working-directory: server
      - name: Build core SDK
        run: npm install && npx tsc
        working-directory: javascript/sdk/core
      - name: Build Express SDK
        run: npm install && rm -rf node_modules/simplehook-core && cp -R ../core node_modules/simplehook-core && npx tsc
        working-directory: javascript/sdk/express
      - name: Build Fastify SDK
        run: npm install && rm -rf node_modules/simplehook-core && cp -R ../core node_modules/simplehook-core && npx tsc
        working-directory: javascript/sdk/fastify
      - name: Build Hono SDK
        run: npm install && rm -rf node_modules/simplehook-core && cp -R ../core node_modules/simplehook-core && npx tsc
        working-directory: javascript/sdk/hono
      - name: Install test deps
        run: npm install
        working-directory: tests
      - name: Install Express test app
        run: npm install
        working-directory: testApps/express
      - name: Install Fastify test app
        run: npm install
        working-directory: testApps/fastify
      - name: Install Hono test app
        run: npm install
        working-directory: testApps/hono
      - name: Auth tests
        run: node --test auth.test.js
        working-directory: tests
      - name: Billing tests
        run: node --test billing.test.js
        working-directory: tests
      - name: Stats tests
        run: node --test stats.test.js
        working-directory: tests
      - name: Migration tests
        run: node --test migrations.test.js
        working-directory: tests
      - name: E2E webhook tests
        run: node --test e2e.test.js
        working-directory: tests
      - name: Stress tests
        run: node --test stress.test.js
        working-directory: tests
      # Abuse protection tests disabled in CI — sends 100+ requests that
      # overwhelm the single-instance test server. Run locally instead:
      # cd tests && node --test abuse.test.js
      # E2E SDK tests disabled — requires all SDK test apps built + installed.
      # Run locally: cd testApps && node --test e2e-sdk.test.js
