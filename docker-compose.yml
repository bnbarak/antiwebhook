services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: antiwebhooks
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    ports:
      - "8400:8400"
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/antiwebhooks
      BASE_URL: http://localhost:8400
      FRONTEND_URL: http://localhost:4000
      PORT: "8400"
      RUST_LOG: antiwebhooks_server=info
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    build: ./javascript/auth
    ports:
      - "8401:8401"
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/antiwebhooks
      BETTER_AUTH_SECRET: dev-secret-32-chars-minimum-here!
      BETTER_AUTH_URL: http://localhost:8401
      WEBAPP_URL: http://localhost:4000
      PORT: "8401"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
